<VirtualHost *:80>
    ServerName pi.local

    # Pi-hole
    ProxyPass        /ph http://localhost:8080/
    ProxyPassReverse /ph http://localhost:8080/

    # Home Assistant
    ProxyPass        /ha http://localhost:8123/
    ProxyPassReverse /ha http://localhost:8123/

    # OpenMediaVault (future)
    ProxyPass        /omv http://localhost:9090/
    ProxyPassReverse /omv http://localhost:9090/

    # Health dashboard (default)
    ProxyPassMatch   / http://localhost:8501/
    ProxyPassReverse / http://localhost:8501/

</VirtualHost>
