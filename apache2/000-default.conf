# -----------------------------------------
# VirtualHost for pi.local (HTTP only)
# Reverse proxy for the admin dashboard (FastAPI, /status).
# TLS is terminated upstream by `tailscale serve` for tailnet access.
# -----------------------------------------

<VirtualHost *:80>
    ServerName pi.local

    ProxyPreserveHost On
    ProxyRequests Off

    RequestHeader setifempty X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-Port "80"

    # Send bare / to the dashboard. Pick the scheme from the Host header so a
    # tailnet visit (served over HTTPS by `tailscale serve`) isn't downgraded
    # to a broken http:// URL, while LAN access stays on http.
    RewriteEngine On
    RewriteCond %{HTTP_HOST} \.ts\.net$ [NC]
    RewriteRule ^/?$ https://%{HTTP_HOST}/status/ [R=302,L]
    RewriteRule ^/?$ http://%{HTTP_HOST}/status/ [R=302,L]

    # WebSocket for the live terminal — must precede the generic /status rule.
    ProxyPass        /status/api/terminal ws://localhost:8501/status/api/terminal
    ProxyPassReverse /status/api/terminal ws://localhost:8501/status/api/terminal

    # Admin dashboard (HTTP + SSE).
    ProxyPass        /status http://localhost:8501/status
    ProxyPassReverse /status http://localhost:8501/status

</VirtualHost>
