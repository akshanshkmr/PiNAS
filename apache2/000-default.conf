# -----------------------------------------
# VirtualHost for pi.local (HTTP only)
# Reverse proxy for the PiNAS dashboard (FastAPI at :8501), served at the
# site root. TLS is terminated upstream by `tailscale serve` for tailnet access.
# -----------------------------------------

<VirtualHost *:80>
    ServerName pi.local

    ProxyPreserveHost On
    ProxyRequests Off

    RequestHeader setifempty X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-Port "80"

    # WebSocket for the live terminal — must precede the generic proxy rule.
    ProxyPass        /api/terminal ws://localhost:8501/api/terminal
    ProxyPassReverse /api/terminal ws://localhost:8501/api/terminal

    # Everything else — SPA + API + SSE.
    ProxyPass        / http://localhost:8501/
    ProxyPassReverse / http://localhost:8501/

</VirtualHost>
