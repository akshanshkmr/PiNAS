# -----------------------------------------
# VirtualHost for pi.local (HTTP only)
# Reverse proxy for:
# - Pi-hole (/ph/)
# - Home Assistant (/ha/)
# - OpenMediaVault (/omv/)
# - Streamlit Dashboard (default)
# -----------------------------------------

<VirtualHost *:80>
    ServerName pi.local

    ProxyPreserveHost On
    ProxyRequests Off

    # Allow reverse proxy requests
    <Proxy *>
        Require all granted
    </Proxy>

    # Preserve important headers
    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-Port "80"

    # --------------------------
    # Pi-hole
    # --------------------------
    ProxyPass        /ph http://localhost:8080/admin
    ProxyPassReverse /ph http://localhost:8080/admin
    ProxyPass        /admin http://localhost:8080/admin
    ProxyPassReverse /admin http://localhost:8080/admin

    # --------------------------
    # Home Assistant (with WebSocket support)
    # --------------------------
    ProxyPass        /ha/api/websocket ws://localhost:8123/api/websocket
    ProxyPassReverse /ha/api/websocket ws://localhost:8123/api/websocket
    ProxyPass        /ha http://localhost:8123/
    ProxyPassReverse /ha http://localhost:8123/

    # --------------------------
    # OpenMediaVault (future)
    # --------------------------
    ProxyPass        /omv http://localhost:9090/
    ProxyPassReverse /omv http://localhost:9090/

    # --------------------------
    # Streamlit Dashboard (default route)
    # --------------------------
    ProxyPass        /_stcore/stream ws://localhost:8501/_stcore/stream
    ProxyPassReverse /_stcore/stream ws://localhost:8501/_stcore/stream
    ProxyPass        / http://localhost:8501/
    ProxyPassReverse / http://localhost:8501/

</VirtualHost>
