# -----------------------------------------
# VirtualHost for pi.local (HTTP only)
# Reverse proxy for:
# - Pi-hole (/pihole/)
# - OpenMediaVault (/omv/)
# - Streamlit Dashboard (default)
# -----------------------------------------

<VirtualHost *:80>
    ServerName pi.local

    ProxyPreserveHost On
    ProxyRequests Off

    # Preserve important headers
    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-Port "80"

    # --------------------------
    # Streamlit Dashboard (default route)
    # --------------------------
    RedirectMatch    ^/$ /status
    ProxyPass        /status/_stcore/stream ws://localhost:8501/status/_stcore/stream
    ProxyPassReverse /status/_stcore/stream ws://localhost:8501/status/_stcore/stream
    ProxyPass        /status http://localhost:8501/status
    ProxyPassReverse /status http://localhost:8501/status

    # --------------------------
    # Pi-hole 
    # --------------------------
    ProxyPass        /pihole http://localhost:8080/admin
    ProxyPassReverse /pihole http://localhost:8080/admin
    ProxyPass        /admin http://localhost:8080/admin
    ProxyPassReverse /admin http://localhost:8080/admin
    ProxyPass        /api http://localhost:8080/api
    ProxyPassReverse /api http://localhost:8080/api

    # --------------------------
    # OpenMediaVault (future)
    # --------------------------
    ProxyPass        /omv http://localhost:9090
    ProxyPassReverse /omv http://localhost:9090

</VirtualHost>
